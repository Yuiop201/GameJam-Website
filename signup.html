<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Markus GameJams</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Markus GameJams</a>
      <nav class="nav-links">
        <a href="index.html">Overview</a>
        <a href="browse.html">Browse Projects</a>
        <a id="nav-account-link" href="account.html">My Account</a>
        <a id="nav-login-link" href="login.html">Login</a>
        <a href="admin.html">Admin</a>
      </nav>
    </header>

    <main class="page-shell auth-shell">
      <section class="card auth-card">
        <h1>Create an account</h1>
        <p class="muted">Join the community and start sharing your work.</p>
        <form id="signup-form" class="stacked-form">
          <input type="text" id="signup-name" placeholder="Display name" required />
          <input type="email" id="signup-email" placeholder="Email" required />
          <input type="password" id="signup-password" placeholder="Password" required />
          <button class="btn btn-primary" type="submit">Create account</button>
        </form>
        <p class="muted">Already a member? <a href="login.html">Log in</a>.</p>
        <p id="signup-status" class="status-text"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
