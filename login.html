<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Markus GameJams</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Markus GameJams</a>
      <nav class="nav-links">
        <a href="index.html">Overview</a>
        <a href="browse.html">Browse Projects</a>
        <a id="nav-account-link" href="account.html">My Account</a>
        <a id="nav-login-link" href="login.html">Login</a>
        <a href="admin.html">Admin</a>
      </nav>
    </header>

    <main class="page-shell auth-shell">
      <section class="card auth-card">
        <h1>Log in</h1>
        <p class="muted">Sign in to upload, manage your projects, or access moderation tools.</p>
        <form id="login-form" class="stacked-form">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button class="btn btn-primary" type="submit">Sign in</button>
        </form>
        <p class="muted">Need an account? <a href="signup.html">Create one here</a>.</p>
        <p id="login-status" class="status-text"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
